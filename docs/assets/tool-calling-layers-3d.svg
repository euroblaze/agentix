<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1060" font-family="Helvetica, Arial, sans-serif" role="img" aria-labelledby="t74 d74">
  <!-- Source of truth: agentix#74 (OS-primitives mapping) + its tool-calling deep-dive comment;
       kernel code: src/agentix/tools/, app code: ludo-agent src/ludo/tools/.
       Hand-maintained: update labels when the midlayer lands or layer contents change. -->
  <title id="t74">Tool-calling: the four-layer model</title>
  <desc id="d74">Isometric stack of four layers: user space (ludo-agent vendor drivers, policy, vocabulary) on top; below the purity gate the agentix kernel: driver midlayer (to build), reference monitor and confinement, and the frozen syscall surface.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <text x="620" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1c2b3a">Tool-calling — the four-layer model</text>
  <text x="620" y="56" text-anchor="middle" font-size="13" fill="#5a6b7a">agentix kernel × ludo-agent user space · OS mapping per agentix#74</text>

  <!-- ═══════════ LAYER: USER SPACE (top) — cy=160 ═══════════ -->
  <text x="70" y="70" font-size="11" font-style="italic" fill="#7a8a7a">OS analog: userspace programs + vendor device drivers</text>
  <g stroke="#4c6b3c" stroke-width="1.5" stroke-linejoin="round">
    <polygon points="70,160 330,80 590,160 330,240" fill="#8fbc75"/>
    <polygon points="70,160 330,240 330,276 70,196" fill="#6a9455"/>
    <polygon points="330,240 590,160 590,196 330,276" fill="#7aa662"/>
  </g>
  <text x="330" y="150" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e2f14">USER SPACE — ludo-agent</text>
  <text x="330" y="172" text-anchor="middle" font-size="12" fill="#2c4220">vendor drivers · policy · vocabulary · catalog</text>

  <line x1="590" y1="160" x2="656" y2="160" stroke="#888" stroke-dasharray="4 3"/>
  <g>
    <rect x="660" y="84" width="548" height="152" rx="6" fill="#f4f8f1" stroke="#8aa878"/>
    <text x="674" y="106" font-size="12.5" font-weight="bold" fill="#33502a">Odoo device drivers (30): load_to_odoo · extract_from_odoo · verify_migration ·</text>
    <text x="674" y="122" font-size="12.5" font-weight="bold" fill="#33502a">diagnose · drain_model · pin_record · discover_* · consult_memory · …</text>
    <text x="674" y="144" font-size="12" fill="#333">Policy hooks: is_transient() · rollback (xmlid census) · verify contracts ·</text>
    <text x="674" y="160" font-size="12" fill="#333">allowlist grants · budget ceilings · timeouts</text>
    <text x="674" y="182" font-size="12" fill="#333">Vocabulary: xmlid scheme · rename maps · load() coercion (False→"0") ·</text>
    <text x="674" y="198" font-size="12" fill="#333">error-message parsing · RootCauseType · prompts</text>
    <text x="674" y="220" font-size="12" fill="#333">Catalog ($PATH): register_builtin_tools · advertised menu · skill-scoped tools</text>
  </g>

  <!-- trap / results flow + purity gate (gap 276→300) -->
  <line x1="300" y1="278" x2="300" y2="298" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="290" y="292" text-anchor="end" font-size="11" fill="#555">tool call — the trap</text>
  <line x1="360" y1="298" x2="360" y2="278" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="370" y="292" font-size="11" fill="#555">results · progress · safety events</text>
  <line x1="40" y1="288" x2="255" y2="288" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="7 4"/>
  <line x1="620" y1="288" x2="1208" y2="288" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="1208" y="280" text-anchor="end" font-size="11.5" font-weight="bold" fill="#c0392b">PURITY GATE — zero domain words below this line (test_kernel_purity.py)</text>

  <!-- ═══════════ LAYER L3: DRIVER MIDLAYER — cy=380 ═══════════ -->
  <text x="70" y="290" font-size="11" font-style="italic" fill="#6a7f8f">OS analog: driver midlayer — SCSI midlayer / libata</text>
  <g stroke="#2c6b8f" stroke-width="1.5" stroke-dasharray="8 5" stroke-linejoin="round">
    <polygon points="70,380 330,300 590,380 330,460" fill="#79b8d9"/>
    <polygon points="70,380 330,460 330,496 70,416" fill="#5590ad"/>
    <polygon points="330,460 590,380 590,416 330,496" fill="#66a4c4"/>
  </g>
  <text x="330" y="370" text-anchor="middle" font-size="17" font-weight="bold" fill="#0e2d40">L3 · DRIVER MIDLAYER</text>
  <text x="330" y="392" text-anchor="middle" font-size="12" fill="#123a52">agentix — TO BUILD (~830 LOC lifted from app drivers)</text>

  <line x1="590" y1="380" x2="656" y2="380" stroke="#888" stroke-dasharray="4 3"/>
  <g>
    <rect x="660" y="308" width="548" height="144" rx="6" fill="#eff6fa" stroke="#7aa8c4" stroke-dasharray="8 5"/>
    <text x="674" y="330" font-size="12" fill="#333">retry_with_backoff(fn, is_transient) · halve_on_timeout(execute, items)</text>
    <text x="674" y="348" font-size="12" fill="#333">bisect_on_failure(execute, items) · chunk() / batched()</text>
    <text x="674" y="366" font-size="12" fill="#333">fingerprint_dict() · extract_json_object() — one impl also backs adversarial</text>
    <text x="674" y="384" font-size="12" fill="#333">verdicts · aggregate_by_key() · parse_python_ast / parse_xml_structure</text>
    <text x="674" y="406" font-size="12" fill="#555">later: BoundedAgentLoop (from diagnose) · device classes via #77 factory</text>
    <text x="674" y="428" font-size="11.5" font-style="italic" fill="#666">rule: kernel takes the generic body + an app-supplied classifier — never calls up</text>
  </g>

  <line x1="300" y1="498" x2="300" y2="518" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="360" y1="518" x2="360" y2="498" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════ LAYER L2: REFERENCE MONITOR — cy=600 ═══════════ -->
  <text x="70" y="510" font-size="11" font-style="italic" fill="#6a7f8f">OS analog: reference monitor · MAC · namespaces · capability bits</text>
  <g stroke="#274f6e" stroke-width="1.5" stroke-linejoin="round">
    <polygon points="70,600 330,520 590,600 330,680" fill="#4a89b8"/>
    <polygon points="70,600 330,680 330,716 70,636" fill="#35688e"/>
    <polygon points="330,680 590,600 590,636 330,716" fill="#3f78a3"/>
  </g>
  <text x="330" y="590" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">L2 · REFERENCE MONITOR + CONFINEMENT</text>
  <text x="330" y="612" text-anchor="middle" font-size="12" fill="#dce9f3">agentix — every mutating call mediated</text>

  <line x1="590" y1="600" x2="656" y2="600" stroke="#888" stroke-dasharray="4 3"/>
  <g>
    <rect x="660" y="534" width="548" height="132" rx="6" fill="#eef3f8" stroke="#6f94b3"/>
    <text x="674" y="556" font-size="12" fill="#333">SafetyGate.execute — complete mediation of mutates_target ·</text>
    <text x="674" y="572" font-size="12" fill="#333">verify-then-rollback · mandatory-verifier invariant · dry_run block</text>
    <text x="674" y="594" font-size="12" fill="#333">fs sandbox boundaries (contextvars) · register_allowed_hosts / _binaries /</text>
    <text x="674" y="610" font-size="12" fill="#333">_agent_git_identity — mechanisms only; the grants are app policy</text>
    <text x="674" y="632" font-size="12" fill="#333">ctx.progress() · per-tool timeouts</text>
    <text x="674" y="654" font-size="12" fill="#555">direction: #75 signal delivery at dispatch boundaries (cancel · checkpoint)</text>
  </g>

  <line x1="300" y1="718" x2="300" y2="738" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="360" y1="738" x2="360" y2="718" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════ LAYER L1: SYSCALL SURFACE (bottom) — cy=820 ═══════════ -->
  <text x="70" y="730" font-size="11" font-style="italic" fill="#6a7f8f">OS analog: syscall table + ABI + trap handler</text>
  <g stroke="#16293f" stroke-width="1.5" stroke-linejoin="round">
    <polygon points="70,820 330,740 590,820 330,900" fill="#2e5f8a"/>
    <polygon points="70,820 330,900 330,936 70,856" fill="#1f4363"/>
    <polygon points="330,900 590,820 590,856 330,936" fill="#274f75"/>
  </g>
  <text x="330" y="810" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">L1 · SYSCALL SURFACE</text>
  <text x="330" y="832" text-anchor="middle" font-size="12" fill="#cfdeed">agentix — frozen, tiny, versioned</text>

  <line x1="590" y1="820" x2="656" y2="820" stroke="#888" stroke-dasharray="4 3"/>
  <g>
    <rect x="660" y="754" width="548" height="132" rx="6" fill="#edf1f6" stroke="#5f7f9e"/>
    <text x="674" y="776" font-size="12" fill="#333">Tool protocol + ToolSpec · ensure_input (copy_from_user validation)</text>
    <text x="674" y="794" font-size="12" fill="#333">ToolRegistry — the syscall table · no-silent-shadowing</text>
    <text x="674" y="812" font-size="12" fill="#333">dispatch loop — arg coercion · unknown name → ENOSYS + closest match</text>
    <text x="674" y="830" font-size="12" fill="#333">ToolContext — session · 3 stores · source/target as OPAQUE handles (fds)</text>
    <text x="674" y="852" font-size="12" fill="#333">verbs: call · consult · compile (vDSO — skips the LLM trap) · delegate (#503)</text>
    <text x="674" y="874" font-size="11.5" font-style="italic" fill="#666">in-tree drivers ship here too: read_file · grep_files · web_fetch · git_* · write_to_fs</text>
  </g>

  <!-- footer rule -->
  <text x="620" y="990" text-anchor="middle" font-size="13" font-weight="bold" fill="#1c2b3a">The kernel owns the trap, the table, the monitor, and the midlayer —</text>
  <text x="620" y="1010" text-anchor="middle" font-size="13" font-weight="bold" fill="#1c2b3a">the app owns the drivers, the policy, and the words.</text>
  <text x="620" y="1036" text-anchor="middle" font-size="11" fill="#8a8a8a">CRIE 004 (ludo-agent#548) · agentix#74 · #75 · #76 · #77 · ludo#503</text>
</svg>
